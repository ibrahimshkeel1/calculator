<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-link active">Calculator</a>
    <a href="converter.html" class="nav-link">Unit Converter</a>
    <a href="chem-eng.html" class="nav-link">Chem. Eng. Units</a>
    <a href="drain.html" class="nav-link">Vessel Drain</a>
    <a href="evaporation.html" class="nav-link">Evaporation Solids</a>
    <a href="natural-gas.html" class="nav-link">Natural Gas</a>
    <a href="hse-analysis.html" class="nav-link">HSE Analysis</a>
    <a href="hse-ua-uc.html" class="nav-link">UA/UC Analysis</a>
    <a href="hse-good-obs.html" class="nav-link">Good Obs Analysis</a>
  </nav>

  <div class="calculator">
    <div class="mode-indicator" id="angle-mode">DEG</div>
    <div class="display" id="display">0</div>

    <div class="buttons scientific">
      <button class="btn scientific" data-scientific="sin">sin</button>
      <button class="btn scientific" data-scientific="cos">cos</button>
      <button class="btn scientific" data-scientific="tan">tan</button>
      <button class="btn scientific" data-action="toggle-angle">DEG</button>

      <button class="btn scientific" data-scientific="log">log</button>
      <button class="btn scientific" data-scientific="ln">ln</button>
      <button class="btn scientific" data-scientific="sqrt">√</button>
      <button class="btn scientific" data-scientific="square">x²</button>

      <button class="btn scientific" data-operator="^">xʸ</button>
      <button class="btn scientific" data-scientific="reciprocal">1/x</button>
      <button class="btn scientific" data-constant="pi">π</button>
      <button class="btn scientific" data-constant="e">e</button>

      <button class="btn scientific" data-scientific="factorial">n!</button>
      <button class="btn scientific" data-scientific="negate">±</button>
      <button class="btn scientific" data-action="backspace">⌫</button>
      <button class="btn action" data-action="clear">C</button>
    </div>

    <div class="buttons standard">
      <button class="btn operator" data-operator="/">÷</button>
      <button class="btn operator" data-operator="*">×</button>
      <button class="btn operator" data-operator="-">−</button>
      <button class="btn operator" data-operator="+">+</button>

      <button class="btn number" data-number="7">7</button>
      <button class="btn number" data-number="8">8</button>
      <button class="btn number" data-number="9">9</button>
      <button class="btn equals" data-action="equals">=</button>

      <button class="btn number" data-number="4">4</button>
      <button class="btn number" data-number="5">5</button>
      <button class="btn number" data-number="6">6</button>

      <button class="btn number" data-number="1">1</button>
      <button class="btn number" data-number="2">2</button>
      <button class="btn number" data-number="3">3</button>

      <button class="btn number zero" data-number="0">0</button>
      <button class="btn number" data-number=".">.</button>
    </div>
  </div>
  <script src="calculator.js"></script>
</body>
</html>
